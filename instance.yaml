# ============================================================
# INSTANCE CONFIGURATION
# Change this file to deploy for any team/department.
# No code changes needed — just edit and rebuild.
# ============================================================

# ── App Branding ─────────────────────────────────────────────
app:
  name: "Document Agentic RAG"
  tagline: "Intelligent Curator"
  description: "AI-powered document intelligence agent with self-learning RAG"
  icon: "hub"                    # Material Symbols icon name
  primary_color: "#1a237e"       # Sidebar + accents
  # logo_url: "/static/logo.png" # Optional: custom logo instead of icon

# ── Agent Persona ────────────────────────────────────────────
agent:
  name: "Document Agent"
  role: "document intelligence assistant"
  focus: "all organizational documents — policies, guides, manuals, reports, procedures, forms"
  personality: "professional, precise, proactive"
  languages:
    - English
    - Burmese

# ── Document Categories ──────────────────────────────────────
# Suggested categories for AI classification.
# The AI can still create new ones — these are hints.
categories:
  - infrastructure/cloud
  - infrastructure/network
  - enterprise/odoo
  - enterprise/sap
  - digital-product/city-platform
  - government/immigration
  - policy/hr
  - policy/security
  - guide/onboarding
  - data-bi/reports
  - energy/bcp
  - legal/compliance
  - pmo

# ── Document Types ───────────────────────────────────────────
document_types:
  - configuration
  - troubleshooting
  - setup
  - daily-operations
  - incident-management
  - access-management
  - policy
  - guide
  - report
  - certificate
  - form
  - framework
  - plan
  - extract

# ── Widget ───────────────────────────────────────────────────
widget:
  title: "Document Assistant"
  welcome: "Hi! I can help you find information from our document library. What are you looking for?"
  placeholder: "Ask about any procedure, policy, or document..."

# ── Examples ─────────────────────────────────────────────────
# Shown in chat as quick-start suggestions
example_questions:
  - "What documents do we have?"
  - "Show me all policies"
  - "How do I complete this process?"
  - "Summarize this document"


